services:
  postgresql:
    image: postgres:15
    container_name: pfmp-postgresql
    environment:
      - POSTGRES_DB=pfmp_dev
      - POSTGRES_USER=pfmp_user
      - POSTGRES_PASSWORD=MediaPword.1
      - TZ=America/Chicago
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - pfmp_postgresql_data:/var/lib/postgresql/data
      - /volume1/docker/pfmp-postgresql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - 5433:5432/tcp
    network_mode: synobridge
    security_opt:
      - no-new-privileges:true
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pfmp_user -d pfmp_dev"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pfmp_postgresql_data:
    driver: local
      